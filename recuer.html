<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Master Logopedia: Clasificación Total de Sonidos</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #34495e;
            --accent: #e67e22;
            --success: #27ae60;
            --danger: #d63031;
            --bg: #ecf0f1;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; color: var(--primary); }
        .container { max-width: 1100px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        h1 { border-bottom: 3px solid var(--accent); padding-bottom: 10px; text-align: center; font-size: 24px; color: var(--primary); }
        
        .grid-estudio { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-top: 20px; }
        
        .seccion { border: 1px solid #ddd; border-radius: 8px; padding: 12px; background: #fdfdfd; display: flex; flex-direction: column; }
        .seccion h3 { margin-top: 0; color: var(--secondary); border-bottom: 2px solid #eee; font-size: 16px; padding-bottom: 5px; }

        /* Estilo de botones */
        .fonema-btn {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 4px 0;
            background: var(--primary);
            color: white;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            font-size: 13px;
            text-align: left;
        }
        .fonema-btn:hover { background: var(--accent); transform: scale(1.02); }
        .fonema-btn.nasal { background: var(--success); }
        .fonema-btn.sonoridad { background: #8e44ad; }

        /* Panel de Detalle */
        #detalle-tecnico {
            margin-top: 20px;
            padding: 20px;
            background: var(--secondary);
            color: white;
            border-radius: 10px;
            min-height: 140px;
            border-left: 10px solid var(--accent);
            position: relative;
        }
        .label { font-weight: bold; color: #f39c12; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; }
        .highlight { color: #fff; font-size: 22px; display: block; margin: 5px 0; font-weight: bold; }
        .desc-texto { font-size: 15px; line-height: 1.4; color: #ecf0f1; }
        
        .info-bottom { display: flex; justify-content: space-between; margin-top: 15px; font-size: 13px; border-top: 1px solid #5d6d7e; padding-top: 10px; color: #bdc3c7; }

        .organos-lista { font-size: 12px; background: #eee; padding: 8px; border-radius: 5px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🔬 Sistema de Articulación y Fonética </h1>
    
    <div class="grid-estudio">
        <div class="seccion">
            <h3>Por Lugar (Donde)</h3>
            <button class="fonema-btn" onclick="ver('m, p, b', 'Bilabiales', 'Contacto entre ambos labios.')">Bilabiales</button>
            <button class="fonema-btn" onclick="ver('f', 'Labiodentales', 'Labio inferior con los incisivos superiores.')">Labiodentales</button>
            <button class="fonema-btn" onclick="ver('d, t', 'Linguodentales', 'La punta de la lengua contra los dientes.')">Linguodentales</button>
            <button class="fonema-btn" onclick="ver('l, n, r, rr, s', 'Linguoalveolares', 'Lengua contra la zona alveolar.')">Linguoalveolares</button>
            <button class="fonema-btn" onclick="ver('ch, ll, ñ, y', 'Linguopalatales', 'Dorso de la lengua contra el paladar.')">Linguopalatales</button>
            <button class="fonema-btn" onclick="ver('k, g, j', 'Linguovelares', 'Postdorso de la lengua contra el velo.')">Linguovelares</button>
        </div>

        <div class="seccion">
            <h3>Por Modo (Cómo)</h3>
            <button class="fonema-btn" onclick="ver('p, b, t, d, k, g', 'Oclusivos', 'Cierre total y salida brusca del aire.')">Oclusivos</button>
            <button class="fonema-btn" onclick="ver('f, s, j', 'Fricativos', 'El aire sale rozando por un canal estrecho.')">Fricativos</button>
            <button class="fonema-btn" onclick="ver('ch', 'Africados', 'Momento de oclusión seguido de fricción.')">Africados</button>
            <button class="fonema-btn" onclick="ver('r, rr', 'Vibrantes', 'La lengua produce vibraciones rápidas.')">Vibrantes</button>
            <button class="fonema-btn" onclick="ver('l', 'Laterales / Líquidas', 'El aire sale por los laterales de la lengua.')">Laterales / Líquidas</button>
        </div>

        <div class="seccion">
            <h3>Velo y Cuerdas</h3>
            <button class="fonema-btn nasal" onclick="ver('m, n, ñ', 'Nasales', 'El velo del paladar baja y permite paso nasal.')">Nasales (Velo bajo)</button>
            <button class="fonema-btn nasal" style="background:#2980b9" onclick="ver('Todos menos nasales', 'Orales', 'El velo del paladar está cerrado.')">Orales (Velo alto)</button>
            
            <button class="fonema-btn sonoridad" onclick="ver('p, t, k, f, s, ch, j', 'Sordas', 'Las cuerdas vocales se abren y NO vibran.')">Sordas (No vibran)</button>
            <button class="fonema-btn sonoridad" onclick="ver('b, d, g, m, n, ñ, l, r, rr', 'Sonoras', 'Las cuerdas vocales se cierran y VIBRAN.')">Sonoras (Vibran)</button>

            <div class="organos-lista">
                <strong>Órganos:</strong><br>
                Móviles: Labios, Lengua, Velo.<br>
                Fijos: Dientes, Bóveda Palatina.
            </div>
        </div>
    </div>

    <div id="detalle-tecnico">
        <div id="v-contenido">
            <span class="label">Panel de Control:</span>
            <span class="highlight">Listo para estudiar</span>
            <p class="desc-texto">Selecciona cualquier clasificación de tus apuntes para ver el perfil articulatorio detallado.</p>
        </div>
    </div>
</div>

<script>
    function ver(fonemas, titulo, descripcion) {
        const visor = document.getElementById('v-contenido');
        visor.innerHTML = `
            <span class="label">Perfil Articulatorio:</span>
            <span class="highlight">${titulo}</span>
            <p class="desc-texto">${descripcion}</p>
            <div class="info-bottom">
                <span><strong>Fonemas:</strong> /${fonemas}/</span>
                <span><strong>Fuente:</strong> Apuntes Diana Chimbo</span>
            </div>
        `;
        
        const panel = document.getElementById('detalle-tecnico');
        panel.style.transition = "0.1s";
        panel.style.transform = "translateY(-5px)";
        setTimeout(() => panel.style.transform = "translateY(0)", 100);
    }
</script>

</body>
</html>
