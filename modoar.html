<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiki: El Muñeco de la Lengua</title>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #00b894, #006266); /* Fondo tipo selva/tropical */
            font-family: 'Arial Rounded MT Bold', 'Helvetica', sans-serif;
            overflow: hidden;
            cursor: crosshair;
        }

        /* --- NOMBRE DEL PERSONAJE --- */
        #nombre-tiki {
            position: absolute;
            top: 40px;
            font-size: 80px;
            color: #fab1a0;
            text-shadow: 4px 4px 0px #d63031, 8px 8px 20px rgba(0,0,0,0.5);
            letter-spacing: 5px;
            transform: rotate(-5deg);
            z-index: 20;
        }

        /* --- CARA DE TIKI --- */
        .cara-muñeco {
            position: relative;
            width: 280px;
            height: 350px;
            background-color: #ffeaa7; /* Color amarillento vibrante */
            border-radius: 120px 120px 140px 140px;
            border: 8px solid #fdcb6e;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 60px;
        }

        /* --- OJOS --- */
        .contenedor-ojos {
            display: flex;
            gap: 35px;
            margin-bottom: 40px;
        }

        .ojo {
            width: 70px;
            height: 70px;
            background-color: white;
            border-radius: 50%;
            border: 4px solid #2d3436;
            position: relative;
            overflow: hidden;
        }

        .pupila {
            width: 35px;
            height: 35px;
            background-color: #2d3436;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        .pupila::after {
            content: '';
            position: absolute;
            top: 5px;
            left: 5px;
            width: 10px;
            height: 10px;
            background-color: white;
            border-radius: 50%;
        }

        /* --- BOCA Y LENGUA --- */
        .boca-ancla {
            position: relative;
            width: 110px;
            height: 50px;
            background-color: #2d3436;
            border-radius: 0 0 100px 100px;
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.5);
        }

        .lengua {
            position: absolute;
            top: 5px;
            left: 50%;
            width: 45px;
            height: 60px;
            background: linear-gradient(to bottom, #ff7675, #d63031);
            border-radius: 22px;
            transform-origin: top center;
            transform: translateX(-50%) rotate(0deg);
            transition: height 0.02s linear;
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
            z-index: 10;
        }

        .lengua::before {
            content: '';
            position: absolute;
            top: 15%;
            left: 50%;
            width: 4px;
            height: 60%;
            background-color: rgba(0,0,0,0.15);
            transform: translateX(-50%);
            border-radius: 2px;
        }

        /* --- INFO --- */
        #instrucciones {
            position: fixed;
            bottom: 20px;
            color: white;
            background: rgba(0,0,0,0.3);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <h1 id="nombre-tiki">TIKI</h1>

    <div class="cara-muñeco">
        <div class="contenedor-ojos">
            <div class="ojo">
                <div class="pupila"></div>
            </div>
            <div class="ojo">
                <div class="pupila"></div>
            </div>
        </div>

        <div class="boca-ancla" id="boca">
            <div class="lengua" id="lengua"></div>
        </div>
    </div>

    <div id="instrucciones">¡Mueve el ratón para que Tiki saque la lengua!</div>

    <script>
        const lengua = document.getElementById('lengua');
        const boca = document.getElementById('boca');
        const pupilas = document.querySelectorAll('.pupila');

        document.addEventListener('mousemove', (e) => {
            // Movimiento de la lengua de Tiki
            const rectBoca = boca.getBoundingClientRect();
            const rootX = rectBoca.left + rectBoca.width / 2;
            const rootY = rectBoca.top + 10; 

            const dX = e.clientX - rootX;
            const dY = e.clientY - rootY;

            const angleRad = Math.atan2(dY, dX);
            const angleDeg = angleRad * (180 / Math.PI) - 90;

            const distance = Math.sqrt(dX*dX + dY*dY);
            const finalLength = Math.min(distance, 400);

            lengua.style.transform = `translateX(-50%) rotate(${angleDeg}deg)`;
            lengua.style.height = `${finalLength}px`;

            // Movimiento de las pupilas (miran a donde va la lengua)
            pupilas.forEach(pupila => {
                const ojo = pupila.parentElement;
                const rectOjo = ojo.getBoundingClientRect();
                const ojoCenterX = rectOjo.left + rectOjo.width / 2;
                const ojoCenterY = rectOjo.top + rectOjo.height / 2;

                const anguloOjo = Math.atan2(e.clientY - ojoCenterY, e.clientX - ojoCenterX);
                const maxMov = 12; 
                
                const moveX = Math.cos(anguloOjo) * maxMov;
                const moveY = Math.sin(anguloOjo) * maxMov;

                pupila.style.transform = `translate(calc(-50% + ${moveX}px), calc(-50% + ${moveY}px))`;
            });
        });
    </script>
</body>
</html>
