<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neuro Print - Entrenamiento Fonológico</title>
    <style>
        :root {
            --primary: #3498db;
            --success: #27ae60;
            --error: #e67e22;
            --bg: #f4f7f6;
            --text: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 600px;
            width: 90%;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #eee;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        #progress-fill {
            width: 0%;
            height: 100%;
            background: var(--success);
            border-radius: 5px;
            transition: width 0.3s;
        }

        .visual-display {
            font-size: 80px;
            background: #f9f9f9;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: inline-block;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        button {
            padding: 20px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            background-color: var(--primary);
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover { transform: scale(1.02); filter: brightness(1.1); }

        #feedback {
            margin-top: 20px;
            font-size: 1.2rem;
            font-weight: 600;
            min-height: 30px;
        }

        #start-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .correct { color: var(--success); }
        .incorrect { color: var(--error); }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1 style="color: var(--text)">Neuro Print</h1>
        <p>Entrenamiento de Discriminación Auditiva</p>
        <button onclick="startGame()" style="padding: 20px 50px;">¡COMENZAR!</button>
    </div>

    <div class="container">
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <h2 id="instruction">Escucha con atención:</h2>
        
        <div id="visual" class="visual-display">❓</div>
        
        <div class="button-group">
            <button id="btn0" onclick="handleChoice(0)"></button>
            <button id="btn1" onclick="handleChoice(1)"></button>
        </div>

        <div id="feedback"></div>
    </div>

    <script>
        const allLevels = [
            { img: "🐂", words: ["TORO", "TODO"], correct: 0 },
            { img: "👩", words: ["CADA", "CARA"], correct: 1 },
            { img: "🍐", words: ["PERA", "PEDA"], correct: 0 },
            { img: "🦜", words: ["LORO", "LODO"], correct: 0 },
            { img: "🤝", words: ["CODA", "CORA"], correct: 1 },
            { img: "🥘", words: ["MORO", "MODO"], correct: 0 },
            { img: "🧿", words: ["A-RA", "A-DA"], correct: 0 },
            { img: "🌊", words: ["MA-RE", "MA-DE"], correct: 0 },
            { img: "🕯️", words: ["CERA", "CEDA"], correct: 0 },
            { img: "🏃", words: ["CORO", "CODO"], correct: 0 },
            { img: "💰", words: ["ORO", "ODO"], correct: 0 },
            { img: "🔥", words: ["IRA", "IDA"], correct: 1 },
            { img: "🍇", words: ["MORA", "MODA"], correct: 0 },
            { img: "🪵", words: ["VARA", "VADA"], correct: 0 },
            { img: "🧗", words: ["MURO", "MUDO"], correct: 0 },
            { img: "🐕", words: ["PERO", "PEDO"], correct: 0 },
            { img: "🚢", words: ["FARO", "FADO"], correct: 0 },
            { img: "🩹", words: ["CURA", "CUDA"], correct: 0 },
            { img: "🔵", words: ["ARO", "ADO"], correct: 0 },
            { img: "🏰", words: ["MURO", "MUDO"], correct: 0 },
            { img: "🧘", words: ["PARA", "PADA"], correct: 0 },
            { img: "🏜️", words: ["ARENA", "ADENA"], correct: 0 },
            { img: "🍒", words: ["CEREZA", "CEDEZA"], correct: 0 },
            { img: "🧵", words: ["TIRA", "TIDA"], correct: 0 },
            { img: "🥣", words: ["PURÉ", "PUDÉ"], correct: 0 },
            { img: "🧺", words: ["RE-RE", "RE-DE"], correct: 1 },
            { img: "🌀", words: ["A-IRE", "A-IDE"], correct: 0 },
            { img: "🏴‍☠️", words: ["PIRATA", "PIDATA"], correct: 0 },
            { img: "🎨", words: ["COLOR", "COLOD"], correct: 0 },
            { img: "🔋", words: ["PILA", "PIRA"], correct: 1 },
            { img: "🔨", words: ["DURO", "DUDO"], correct: 0 },
            { img: "🦁", words: ["FIERA", "FIEDA"], correct: 0 }
        ];

        let gameLevels = [];
        let currentLevel = 0;

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'es-EC';
            msg.rate = 0.75; // Un poco más lento para niños
            window.speechSynthesis.speak(msg);
        }

        function startGame() {
            // Mezclar niveles aleatoriamente
            gameLevels = allLevels.sort(() => Math.random() - 0.5);
            document.getElementById('start-screen').style.display = 'none';
            loadLevel();
        }

        function loadLevel() {
            const data = gameLevels[currentLevel];
            document.getElementById('visual').textContent = data.img;
            document.getElementById('btn0').textContent = data.words[0];
            document.getElementById('btn1').textContent = data.words[1];
            document.getElementById('feedback').textContent = "";
            
            const progress = (currentLevel / gameLevels.length) * 100;
            document.getElementById('progress-fill').style.width = progress + "%";
            
            setTimeout(() => {
                speak("¿Dónde escuchas " + data.words[data.correct] + "?");
            }, 500);
        }

        function handleChoice(index) {
            const data = gameLevels[currentLevel];
            const feedbackEl = document.getElementById('feedback');
            
            speak(data.words[index]);

            if (index === data.correct) {
                feedbackEl.textContent = "¡Muy bien! 🌟";
                feedbackEl.className = "correct";
                
                setTimeout(() => {
                    currentLevel++;
                    if (currentLevel < gameLevels.length) {
                        loadLevel();
                    } else {
                        showFinal();
                    }
                }, 1500);
            } else {
                feedbackEl.textContent = "¡Escucha con atención!";
                feedbackEl.className = "incorrect";
            }
        }

        function showFinal() {
            document.getElementById('progress-fill').style.width = "100%";
            document.getElementById('visual').textContent = "🏆";
            document.getElementById('instruction').textContent = "¡Sesión Completada!";
            document.querySelector('.button-group').style.display = 'none';
            document.getElementById('feedback').textContent = "¡Excelente trabajo hoy!";
            speak("¡Lo lograste! Terminaste todos los ejercicios.");
        }
    </script>
</body>
</html>
