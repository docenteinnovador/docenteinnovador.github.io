<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Pictogramas</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: #FFF8F0;
      padding: 16px;
      min-height: 100vh;
    }

    .header {
      text-align: center;
      padding: 12px 0 8px;
    }

    .header h1 {
      font-size: 2rem;
      font-weight: 900;
      color: #2c2c2a;
      line-height: 1.1;
    }

    .header p {
      font-size: 1rem;
      color: #888780;
      margin-top: 4px;
      font-weight: 700;
    }

    .filtros {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin: 16px 0;
    }

    .btn-cat {
      padding: 10px 18px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 1rem;
      color: white;
      transition: transform 0.15s, opacity 0.15s;
      border-bottom: 4px solid rgba(0,0,0,0.2);
      letter-spacing: 0.2px;
    }

    .btn-cat:active { transform: scale(0.94) translateY(2px); border-bottom-width: 2px; }

    .btn-cat.activo {
      outline: 3px solid #333;
      outline-offset: 2px;
    }

    .tablero {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 14px;
      max-width: 1000px;
      margin: 0 auto;
    }

    .tarjeta {
      background: white;
      border-radius: 24px;
      padding: 18px 12px 14px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      border-bottom: 6px solid transparent;
      transition: transform 0.15s ease;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .tarjeta:active { transform: scale(0.92); }

    .tarjeta.hablando { background: #fffde7; }

    .emoji-pic {
      font-size: 4rem;
      line-height: 1;
      margin-bottom: 10px;
    }

    .tarjeta span {
      font-size: 1.05rem;
      font-weight: 900;
      color: #2c2c2a;
      text-align: center;
      line-height: 1.2;
      letter-spacing: 0.3px;
    }

    @media (max-width: 400px) {
      .tablero { grid-template-columns: repeat(3, 1fr); gap: 10px; }
      .emoji-pic { font-size: 3rem; }
      .tarjeta span { font-size: 0.9rem; }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>🌈 Mis Pictogramas</h1>
    <p>¡Toca una tarjeta para escucharla!</p>
  </div>

  <div class="filtros" id="filtros"></div>
  <div class="tablero" id="tablero"></div>

  <script>

      { id: 'comida',    label: '🍎 Comida',       color: '#e67e22' },

      { id: 'emociones', label: '😊 Sentimientos', color: '#27ae60' },
      { id: 'animales',  label: '🐶 Animales',     color: '#f39c12' },
      { id: 'ropa',      label: '👕 Ropa',         color: '#2980b9' },

    };

    const datos = [

      { n: 'Borrador',   c: 'escuela',   e: '🧹' },

      { n: 'Camiseta',   c: 'ropa', e: '👕' },

      { n: 'Bufanda',    c: 'ropa', e: '🧣' },

      // CASA
      { n: 'Cama',       c: 'casa', e: '🛏️' },
      { n: 'Mesa',       c: 'casa', e: '🪑' },
      { n: 'Silla',      c: 'casa', e: '🪑' },
      { n: 'Cocina',     c: 'casa', e: '🍳' },
      { n: 'Baño',       c: 'casa', e: '🚿' },
      { n: 'Puerta',     c: 'casa', e: '🚪' },
      { n: 'Ventana',    c: 'casa', e: '🪟' },
      { n: 'Televisión', c: 'casa', e: '📺' },
      { n: 'Teléfono',   c: 'casa', e: '📱' },
      { n: 'Luz',        c: 'casa', e: '💡' },
      { n: 'Nevera',     c: 'casa', e: '🧊' },
      { n: 'Sofá',       c: 'casa', e: '🛋️' },
    ];

    let categoriaActiva = 'todos';

    function renderFiltros() {
      const f = document.getElementById('filtros');
      f.innerHTML = '';
      cats.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'btn-cat' + (categoriaActiva === cat.id ? ' activo' : '');
        btn.textContent = cat.label;
        btn.style.background = cat.color;
        btn.onclick = () => { categoriaActiva = cat.id; renderFiltros(); renderTablero(); };
        f.appendChild(btn);
      });
    }

    function renderTablero() {
      const t = document.getElementById('tablero');
      t.innerHTML = '';
      const lista = categoriaActiva === 'todos' ? datos : datos.filter(d => d.c === categoriaActiva);
      lista.forEach(item => {
        const div = document.createElement('div');
        div.className = 'tarjeta';
        div.style.borderBottomColor = colCat[item.c];
        div.innerHTML = `<div class="emoji-pic">${item.e}</div><span>${item.n.toUpperCase()}</span>`;
        div.onclick = () => {
          div.classList.add('hablando');
          hablar(item.n, () => div.classList.remove('hablando'));
        };
        t.appendChild(div);
      });
    }

    function hablar(texto, cb) {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(texto);
      u.lang = 'es-ES'; u.rate = 0.8; u.pitch = 1.3; u.volume = 1;
      u.onend = cb;
      window.speechSynthesis.speak(u);
    }

    renderFiltros();
    renderTablero();
  </script>
</body>
</html>
