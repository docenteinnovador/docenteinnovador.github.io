<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tiki: Versión Móvil y PC</title>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #00b894, #006266);
            font-family: 'Arial Rounded MT Bold', 'Helvetica', sans-serif;
            overflow: hidden;
            touch-action: none; /* Evita que la pantalla rebote en móviles */
        }

        /* --- SELECTOR --- */
        #panel-control {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.95);
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            z-index: 100;
            font-size: 12px;
        }

        .opcion {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 5px;
            cursor: pointer;
        }

        /* --- TIKI --- */
        #nombre-tiki {
            position: absolute;
            top: 20px;
            font-size: clamp(40px, 15vw, 80px); /* Tamaño adaptable */
            color: #fab1a0;
            text-shadow: 4px 4px 0px #d63031;
            z-index: 20;
        }

        .cara-muñeco {
            position: relative;
            width: 260px;
            height: 320px;
            background-color: #ffeaa7;
            border-radius: 120px 120px 140px 140px;
            border: 8px solid #fdcb6e;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
        }

        .contenedor-ojos {
            display: flex;
            gap: 30px;
            margin-bottom: 35px;
        }

        .ojo {
            width: 65px;
            height: 65px;
            background-color: white;
            border-radius: 50%;
            border: 4px solid #2d3436;
            position: relative;
            overflow: hidden;
        }

        .pupila {
            width: 30px;
            height: 30px;
            background-color: #2d3436;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: transform 0.1s ease-out;
        }

        .boca-ancla {
            position: relative;
            width: 100px;
            height: 45px;
            background-color: #2d3436;
            border-radius: 0 0 100px 100px;
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.5);
        }

        .dientes {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 20px;
            display: flex;
            justify-content: space-between;
            opacity: 0; 
            transition: opacity 0.2s ease;
            pointer-events: none;
        }

        .diente {
            width: 18px;
            height: 100%;
            background-color: #f1f2f6;
            border-radius: 0 0 6px 6px;
            border: 1px solid #ced6e0;
        }

        .boca-ancla.modo-dientes-activo .dientes { opacity: 1; }

        .lengua {
            position: absolute;
            top: 5px;
            left: 50%;
            width: 42px;
            height: 30px;
            background: linear-gradient(to bottom, #ff7675, #d63031);
            border-radius: 20px;
            transform-origin: top center;
            transform: translateX(-50%) rotate(0deg);
            transition: height 0.2s ease, transform 0.2s ease;
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
            z-index: 10;
        }

        #instrucciones {
            position: fixed;
            bottom: 15px;
            color: white;
            background: rgba(0,0,0,0.4);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            text-align: center;
            width: 80%;
        }
    </style>
</head>
<body>

    <div id="panel-control">
        <label class="opcion"><input type="radio" name="modo" value="sin" checked> Lengua asomada</label>
        <label class="opcion"><input type="radio" name="modo" value="con"> Modo Dientes</label>
    </div>

    <h1 id="nombre-tiki">TIKI</h1>

    <div class="cara-muñeco">
        <div class="contenedor-ojos">
            <div class="ojo"><div class="pupila"></div></div>
            <div class="ojo"><div class="pupila"></div></div>
        </div>
        <div class="boca-ancla" id="boca">
            <div class="dientes">
                <div class="diente"></div><div class="diente"></div>
                <div class="diente"></div><div class="diente"></div>
            </div>
            <div class="lengua" id="lengua"></div>
        </div>
    </div>

    <div id="instrucciones">Toca o mueve el dedo/mouse para jugar con Tiki</div>

    <script>
        const lengua = document.getElementById('lengua');
        const boca = document.getElementById('boca');
        const pupilas = document.querySelectorAll('.pupila');
        const selectores = document.querySelectorAll('input[name="modo"]');
        let modoActual = "sin";

        selectores.forEach(r => r.onchange = (e) => modoActual = e.target.value);

        function interactuar(x, y) {
            const rectBoca = boca.getBoundingClientRect();
            const rootX = rectBoca.left + rectBoca.width / 2;
            const rootY = rectBoca.top + 10; 

            const dX = x - rootX;
            const dY = y - rootY;
            const distancia = Math.sqrt(dX * dX + dY * dY);
            
            if (distancia < 100) {
                if (modoActual === "con") {
                    lengua.style.height = "0px";
                    boca.classList.add('modo-dientes-activo');
                } else {
                    lengua.style.height = "30px";
                    boca.classList.remove('modo-dientes-activo');
                    lengua.style.transform = `translateX(-50%) rotate(0deg)`;
                }
                resetPupilas();
                return;
            }

            boca.classList.remove('modo-dientes-activo');
            const angleDeg = Math.atan2(dY, dX) * (180 / Math.PI);
            let rotation = 0;

            if (angleDeg > -45 && angleDeg <= 45) rotation = 90;
            else if (angleDeg > 45 && angleDeg <= 135) rotation = 180;
            else if (angleDeg > 135 || angleDeg <= -135) rotation = -90;
            else if (angleDeg > -135 && angleDeg <= -45) rotation = 0;

            lengua.style.transform = `translateX(-50%) rotate(${rotation}deg)`;
            lengua.style.height = "150px";
            moverPupilas(rotation);
        }

        // Eventos Mouse
        document.addEventListener('mousemove', (e) => interactuar(e.clientX, e.clientY));

        // Eventos Touch (Móvil/Tablet)
        document.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            interactuar(touch.clientX, touch.clientY);
        }, { passive: false });

        function moverPupilas(deg) {
            const rad = (deg - 90) * (Math.PI / 180);
            pupilas.forEach(p => p.style.transform = `translate(calc(-50% + ${Math.cos(rad)*10}px), calc(-50% + ${Math.sin(rad)*10}px))`);
        }

        function resetPupilas() {
            pupilas.forEach(p => p.style.transform = `translate(-50%, -50%)`);
        }
    </script>
</body>
</html>
