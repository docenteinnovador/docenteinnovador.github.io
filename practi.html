<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Guía de Intervención Logopédica - Diana Chimbo</title>
    <style>
        :root {
            --habla: #3498db; --lenguaje: #9b59b6; --voz: #e67e22;
            --bg: #f5f6fa; --text: #2f3640; --white: #ffffff;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 1100px; margin: auto; }
        h1 { text-align: center; color: var(--text); border-bottom: 4px solid var(--habla); padding-bottom: 10px; }

        .grid-estudio { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        
        .card { background: var(--white); border-radius: 15px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-top: 10px solid; }
        .card.habla { border-color: var(--habla); }
        .card.lenguaje { border-color: var(--lenguaje); }
        .card.voz { border-color: var(--voz); }

        .btn-clinico {
            width: 100%; padding: 12px; margin: 6px 0; border: 1px solid #eee; border-radius: 8px;
            background: #fafafa; cursor: pointer; text-align: left; transition: 0.2s; font-weight: bold;
        }
        .btn-clinico:hover { background: #f1f2f6; border-left: 5px solid #2f3640; }

        /* PANEL DE TRABAJO (INTERVENCIÓN) */
        #panel-intervencion {
            margin-top: 30px; background: #2f3640; color: white; padding: 30px;
            border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            border-bottom: 15px solid #7f8c8d;
        }
        .header-v { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
        .tag { padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .nombre-p { font-size: 24px; color: #f1c40f; margin: 0; }
        
        .seccion-trabajo { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 15px; }
        .bloque-t { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; }
        .bloque-t h4 { margin-top: 0; color: #55efc4; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 5px; }
        ul { padding-left: 20px; font-size: 14px; line-height: 1.6; }
    </style>
</head>
<body>

<div class="container">
    <h1>📘 Guía de Trabajo en Logopedia</h1>

    <div class="grid-estudio">
        <div class="card habla">
            <h3>Intervención del Habla</h3>
            <button class="btn-clinico" onclick="mostrar('DISLALIA', 'Habla', ['Ejercicios de soplo (velas, burbujas).', 'Praxias linguales y labiales.', 'Discriminación auditiva del fonema.'], ['Espejo para biofeedback.', 'Láminas de fonemas específicos.'])">Dislalia</button>
            <button class="btn-clinico" onclick="mostrar('DISARTRIA', 'Habla', ['Fortalecimiento muscular orofacial.', 'Control postural y respiratorio.', 'Técnicas de masticación y deglución.'], ['Masajes vibratorios.', 'Soportes de postura.'])">Disartria</button>
            <button class="btn-clinico" onclick="mostrar('DISFEMIA', 'Habla', ['Técnicas de relajación diafragmática.', 'Habla silabeada o rítmica.', 'Reducción de la ansiedad social.'], ['Metrónomo.', 'Grabaciones de voz.'])">Disfemia (Tartamudez)</button>
        </div>

        <div class="card lenguaje">
            <h3>Intervención del Lenguaje</h3>
            <button class="btn-clinico" onclick="mostrar('TEL / TDL', 'Lenguaje', ['Sistemas aumentativos (SAAC).', 'Expansión de vocabulario funcional.', 'Estructuración de frases cortas.'], ['Pictogramas.', 'Software educativo interactivo.'])">TEL / TDL</button>
            <button class="btn-clinico" onclick="mostrar('DISLEXIA', 'Lenguaje', ['Conciencia fonológica (rimas, sílabas).', 'Asociación grafema-fonema.', 'Lectura compartida y guiada.'], ['Letras de lija/textura.', 'Audiolibros.'])">Dislexia</button>
            <button class="btn-clinico" onclick="mostrar('AFASIA', 'Lenguaje', ['Recuperación de léxico (denominación).', 'Comprensión de órdenes simples.', 'Uso de gestos de apoyo.'], ['Tarjetas de objetos cotidianos.', 'Tablets.'])">Afasia</button>
        </div>

        <div class="card voz">
            <h3>Intervención de la Voz</h3>
            <button class="btn-clinico" onclick="mostrar('DISFONÍA', 'Voz', ['Higiene vocal (beber agua, no gritar).', 'Respiración costodiafragmática.', 'Relajación laríngea.'], ['Vaporizadores.', 'Diapasón para tono.'])">Disfonía</button>
            <button class="btn-clinico" onclick="mostrar('RINOLALIA', 'Voz', ['Ejercicios de soplo nasal/bucal.', 'Masaje del velo del paladar.', 'Articulación exagerada.'], ['Espejitos de Glatzel.', 'Pajitas de diferentes grosores.'])">Rinolalia</button>
        </div>
    </div>

    <div id="panel-intervencion">
        <div id="dinamico">
            <div class="header-v">
                <h2 class="nombre-p">Plan de Trabajo</h2>
                <span class="tag" style="background:#7f8c8d">Selecciona un trastorno</span>
            </div>
            <p>Haz clic en un trastorno para desplegar las estrategias de intervención clínica.</p>
        </div>
    </div>
</div>

<script>
    function mostrar(nombre, tipo, estrategias, materiales) {
        const panel = document.getElementById('dinamico');
        let color = tipo === 'Habla' ? '#3498db' : (tipo === 'Lenguaje' ? '#9b59b6' : '#e67e22');
        
        let estHTML = estrategias.map(e => `<li>${e}</li>`).join('');
        let matHTML = materiales.map(m => `<li>${m}</li>`).join('');

        panel.innerHTML = `
            <div class="header-v">
                <h2 class="nombre-p">${nombre}</h2>
                <span class="tag" style="background:${color}">${tipo.toUpperCase()}</span>
            </div>
            <div class="seccion-trabajo">
                <div class="bloque-t">
                    <h4>Estrategias de Intervención</h4>
                    <ul>${estHTML}</ul>
                </div>
                <div class="bloque-t">
                    <h4>Materiales Recomendados</h4>
                    <ul>${matHTML}</ul>
                </div>
            </div>
        `;
        document.getElementById('panel-intervencion').style.borderBottomColor = color;
    }
</script>

</body>
</html>
