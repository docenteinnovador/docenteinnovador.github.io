<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página en Mantenimiento</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #000000;
            color: #333;
            text-align: center;
        }
        .container {
            max-width: 600px;
        }
        h1 {
            font-size: 2em;
            color: #ffffff;
        }
        p {
            font-size: 1.2em;
            color: #bbbbbb;
        }
        img {
            width: 240px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Estamos trabajando para ofrecerle la mejor navegación</h1>
        <p>Por favor, tenga paciencia.</p>
        <img src="https://i.gifer.com/75ez.gif" alt="Mantenimiento en proceso">
    </div>
</body>
</html>
