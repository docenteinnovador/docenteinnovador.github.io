<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Súper Desafío de Palabras</title>
    <style>
        :root {
            --primary: #6200ee;
            --success: #00c853;
            --error: #ff1744;
            --bg: #f0f4f8;
        }

        body {
            font-family: 'Comic Sans MS', sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            touch-action: manipulation;
        }

        .header { text-align: center; margin-bottom: 10px; }
        h1 { color: #311b92; font-size: 1.4rem; margin: 5px 0; }
        
        .progress-bar {
            width: 100%;
            max-width: 350px;
            height: 10px;
            background: #d1d9e6;
            border-radius: 5px;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--success);
            width: 0%;
            transition: width 0.3s;
        }

        .card {
            background: white;
            width: 90%;
            max-width: 350px;
            padding: 40px 15px;
            border-radius: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            text-align: center;
            border: 4px solid #b39ddb;
        }

        .display-word {
            font-size: 2.8rem;
            font-weight: bold;
            color: #4527a0;
            margin-bottom: 30px;
            display: block;
            letter-spacing: 2px;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn-opt {
            background: #fff;
            border: 3px solid #6200ee;
            border-radius: 20px;
            padding: 18px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #6200ee;
            box-shadow: 0 4px 0 #311b92;
            cursor: pointer;
            transition: 0.1s;
        }

        .btn-opt:active { transform: translateY(4px); box-shadow: none; }
        .btn-opt.correct { background: var(--success); border-color: #1b5e20; color: white; box-shadow: 0 4px 0 #1b5e20; }
        .btn-opt.wrong { background: var(--error); border-color: #b71c1c; color: white; box-shadow: 0 4px 0 #b71c1c; }

        #msg { margin-top: 20px; font-weight: bold; font-size: 1.2rem; height: 30px; }
        .counter { font-size: 0.9rem; color: #666; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🔍 ¿Cómo se dice?</h1>
        <div class="counter">Palabra <span id="idx">1</span> de 15</div>
        <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
    </div>

    <div class="card" id="game-card">
        <span class="display-word" id="target">TORO</span>
        <div class="options">
            <button class="btn-opt" id="o1" onclick="verify(this)"></button>
            <button class="btn-opt" id="o2" onclick="verify(this)"></button>
        </div>
    </div>

    <div id="msg"></div>

    <script>
        const bigBank = [
            // R suave vs D
            { c: "TORO", w: "TODO" }, { c: "CARO", w: "CADO" }, { c: "CORO", w: "CODO" },
            { c: "MURO", w: "MUDO" }, { c: "MIRA", w: "MIDA" }, { c: "PERA", w: "PEDA" },
            { c: "LORA", w: "LODA" }, { c: "CURA", w: "CUDA" }, { c: "MORO", w: "MODO" },
            { c: "PARA", w: "PADA" }, { c: "AIRE", w: "AIDE" }, { c: "VERA", w: "VEDA" },
            // R suave vs L
            { c: "PERA", w: "PELA" }, { c: "CORO", w: "COLO" }, { c: "PARA", w: "PALA" },
            { c: "MARA", w: "MALA" }, { c: "CERO", w: "CELO" }, { c: "MIRA", w: "MILA" },
            { c: "TIRA", w: "TILA" }, { c: "CARO", w: "CALO" }, { c: "BARA", w: "BALA" },
            { c: "CORA", w: "COLA" }, { c: "TORO", w: "TOLO" }, { c: "PERO", w: "PELO" },
            // R suave vs N
            { c: "MIRA", w: "MINA" }, { c: "PARA", w: "PANA" }, { c: "CORO", w: "CONO" },
            { c: "PERA", w: "PENA" }, { c: "CARO", w: "CANO" }, { c: "MORA", w: "MONA" },
            { c: "LORA", w: "LONA" }, { c: "TIRA", w: "TINA" }, { c: "VARA", w: "VANA" },
            // Otras confusiones divertidas (P/B, T/D)
            { c: "BATA", w: "PATA" }, { c: "BESO", w: "PESO" }, { c: "BOLA", w: "POLA" },
            { c: "BURRO", w: "PURRO" }, { c: "DADO", w: "TADO" }, { c: "TAPA", w: "DAPA" },
            { c: "GATO", w: "KATO" }, { c: "CASA", w: "GASA" }, { c: "PATO", w: "BATO" },
            { c: "FOCA", w: "POCA" }, { c: "VINO", w: "FINO" }, { c: "SOPA", w: "ZOPA" },
            { c: "ROSA", w: "LOSA" }, { c: "RANA", w: "LANA" }, { c: "RAMA", w: "LAMA" },
            { c: "RICO", w: "LICO" }, { c: "ROPA", w: "LOPA" }, { c: "RUTA", w: "LUTA" }
        ];

        let currentQ = 0;
        let sessionData = [];
        const totalPerGame = 15; // Jugar de 15 en 15 para no cansar

        function start() {
            currentQ = 0;
            sessionData = [...bigBank].sort(() => 0.5 - Math.random()).slice(0, totalPerGame);
            render();
        }

        function render() {
            if (currentQ >= totalPerGame) {
                document.getElementById('game-card').innerHTML = "<h2>¡Súper Campeón! 🏆</h2><p>Has terminado todas las palabras.</p><button class='btn-opt' onclick='location.reload()'>¡Jugar otra vez!</button>";
                return;
            }

            const item = sessionData[currentQ];
            document.getElementById('target').innerText = item.c;
            document.getElementById('idx').innerText = currentQ + 1;
            document.getElementById('progress').style.width = (currentQ / totalPerGame * 100) + "%";
            
            const opts = [item.c, item.w].sort(() => 0.5 - Math.random());
            const b1 = document.getElementById('o1');
            const b2 = document.getElementById('o2');
            
            b1.innerText = opts[0]; b1.className = "btn-opt";
            b2.innerText = opts[1]; b2.className = "btn-opt";
            document.getElementById('msg').innerText = "";
        }

        function verify(btn) {
            const correct = sessionData[currentQ].c;
            if (btn.innerText === correct) {
                btn.classList.add('correct');
                document.getElementById('msg').innerText = "¡SÍ! 🌟";
                setTimeout(() => { currentQ++; render(); }, 800);
            } else {
                btn.classList.add('wrong');
                document.getElementById('msg').innerText = "¡Casi! Intenta la otra 🐣";
                setTimeout(() => btn.classList.remove('wrong'), 800);
            }
        }

        start();
    </script>
</body>
</html>
