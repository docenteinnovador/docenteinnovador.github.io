<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dado de Actividades</title>
    <style>
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background-color: #f0faff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: manipulation;
        }

        h1 { color: #2c3e50; font-size: 1.5rem; margin-bottom: 50px; text-align: center; }

        /* ESCENA DEL DADO */
        .scene {
            width: 100px;
            height: 100px;
            perspective: 600px;
        }

        .cube {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transform: translateZ(-50px);
            transition: transform 1.5s cubic-bezier(0.2, 0.8, 0.3, 1);
        }

        /* CARAS DEL DADO */
        .face {
            position: absolute;
            width: 100px;
            height: 100px;
            background: white;
            border: 3px solid #333;
            line-height: 100px;
            font-size: 40px;
            font-weight: bold;
            color: #333;
            text-align: center;
            border-radius: 15px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }

        .front  { transform: rotateY(0deg) translateZ(50px); background: #FFADAD; }
        .back   { transform: rotateY(180deg) translateZ(50px); background: #FFD6A5; }
        .right  { transform: rotateY(90deg) translateZ(50px); background: #FDFFB6; }
        .left   { transform: rotateY(-90deg) translateZ(50px); background: #CAFFBF; }
        .top    { transform: rotateX(90deg) translateZ(50px); background: #9BF6FF; }
        .bottom { transform: rotateX(-90deg) translateZ(50px); background: #A0C4FF; }

        /* CARTEL DE RESULTADO */
        #result-container {
            margin-top: 60px;
            min-height: 80px;
            text-align: center;
            padding: 20px;
            width: 80%;
            max-width: 300px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border: 3px solid #A0C4FF;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            opacity: 0;
            transform: scale(0.8);
        }

        #result-container.show {
            opacity: 1;
            transform: scale(1);
        }

        #challenge-text {
            font-size: 1.3rem;
            color: #444;
            font-weight: bold;
            margin: 0;
        }

        /* BOTÓN */
        .roll-btn {
            margin-top: 30px;
            padding: 15px 40px;
            background: #FF477E;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 5px 0 #A30032;
            cursor: pointer;
            active: transform translateY(4px);
        }

        .roll-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #A30032;
        }
    </style>
</head>
<body>

    <h1>🎲 ¡Lanza y juega! 🎲</h1>

    <div class="scene">
        <div class="cube" id="cube">
            <div class="face front">1</div>
            <div class="face back">2</div>
            <div class="face right">3</div>
            <div class="face left">4</div>
            <div class="face top">5</div>
            <div class="face bottom">6</div>
        </div>
    </div>

    <div id="result-container">
        <p id="challenge-text">¡Toca el botón rosa!</p>
    </div>

    <button class="roll-btn" onclick="roll()">¡GIRAR DADO!</button>

    <script>
        const challenges = [
            "1. Repite la palabra 🗣️",
            "2. Di una frase ✍️",
            "3. Señala la imagen 🖼️",
            "4. ¡Adivina qué es! 🤔",
            "5. Corrige el error ❌➡️✅",
            "6. Inventa una oración 💡"
        ];

        // Definimos las rotaciones necesarias para que cada cara quede al frente
        const rotations = [
            { x: 0, y: 0 },         // Cara 1
            { x: 0, y: 180 },       // Cara 2
            { x: 0, y: -90 },       // Cara 3
            { x: 0, y: 90 },        // Cara 4
            { x: -90, y: 0 },       // Cara 5
            { x: 90, y: 0 }         // Cara 6
        ];

        function roll() {
            const cube = document.getElementById('cube');
            const resultBox = document.getElementById('result-container');
            const text = document.getElementById('challenge-text');

            // Ocultar resultado anterior
            resultBox.classList.remove('show');

            // Elegir cara al azar (0 a 5)
            const side = Math.floor(Math.random() * 6);
            
            // Añadimos vueltas extras (360 * 3) para que el giro sea espectacular
            const extraRotsX = Math.floor(Math.random() * 3 + 3) * 360;
            const extraRotsY = Math.floor(Math.random() * 3 + 3) * 360;

            const finalX = rotations[side].x + extraRotsX;
            const finalY = rotations[side].y + extraRotsY;

            // Aplicar rotación
            cube.style.transform = `translateZ(-50px) rotateX(${finalX}deg) rotateY(${finalY}deg)`;

            // Mostrar el texto después de que termine la animación (1.5s)
            setTimeout(() => {
                text.innerText = challenges[side];
                resultBox.classList.add('show');
            }, 1500);
        }
    </script>
</body>
</html>
